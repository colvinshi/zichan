version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: asset-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Asset@123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-asset_db}
      MYSQL_USER: ${MYSQL_USER:-asset}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Asset@123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - asset-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: asset-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - asset-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: asset-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-asset}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Asset@123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - asset-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ../asset-parent
      dockerfile: ../deploy/docker/backend/Dockerfile
    container_name: asset-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-asset_db}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-asset}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-Asset@123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      JWT_SECRET: ${JWT_SECRET:-asset-management-jwt-secret-key-2024}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - asset-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端Web
  frontend:
    build:
      context: ../asset-web
      dockerfile: ../deploy/docker/frontend/Dockerfile
    container_name: asset-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - asset-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  # Nginx反向代理 (可选，统一入口)
  nginx:
    image: nginx:alpine
    container_name: asset-nginx
    restart: always
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    networks:
      - asset-network

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:

networks:
  asset-network:
    driver: bridge
